services:
  nginx:
    container_name: nginx
    build: ./nginx
    ports:
      - "80:80"
    networks:
      - network
    depends_on:
      - backend
    develop:
      watch:
        - path: ./nginx
          action: rebuild

  backend:
    container_name: backend
    build: .
    networks:
      - network
    develop:
      watch:
        - path: ./Dockerfile
          action: rebuild
        - path: ./frontend
          action: rebuild

networks:
  network:
    driver: bridge
