services:
  frontend:
    container_name: frontend
    build: .
    ports:
      - '80:8080'
    develop:
      watch:
        - path: .
          action: rebuild

  frontend-dev:
    container_name: frontend
    build:
      context: .
      dockerfile: ./Dockerfile.dev
    ports:
      - '80:5173'
    develop:
      watch:
        - path: ./src
          target: /app/src
          action: sync
