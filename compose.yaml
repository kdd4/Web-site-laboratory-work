services:
    frontend:
        container_name: frontend
        build:
            context: .
            dockerfile: Dockerfile
        ports:
            - "80:8080"
        develop:
            watch:
                - path: ./frontend
                  action: rebuild

    frontend-dev:
        container_name: frontend
        build:
            context: .
            dockerfile: Dockerfile.dev
        ports:
            - "80:5173"
        develop:
            watch:
                - path: ./frontend
                  ignore: src/**
                  target: /app
                  action: rebuild
                - path: ./frontend/src
                  target: /app/src
                  action: sync
